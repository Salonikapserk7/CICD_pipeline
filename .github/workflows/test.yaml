name: Model Training CICD

on:
  push

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies & Run model
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          python train_model.py

          echo "RF and LR Model Score" > report.md
          cat scores.txt >> report.md
          
          echo "Confusion Matrix & Feature Importance" > report1.md
          echo '![](./ConfusionMatrix.png)' >> report1.md
          echo '![](./FeatureImportance.png)' >> report1.md
     
          cat report.md report1.md > combined_file.md

          pip install cml
          cml comment create combined_file.md
